<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Smart Task Manager</h1>
      <p>FastAPI backend + static frontend for tasks, auth, and filtering.</p>
    </header>

    <section class="auth">
      <div class="card">
        <h2>Register</h2>
        <form id="register-form">
          <label>Email</label>
          <input type="email" id="register-email" required />
          <label>Password</label>
          <input type="password" id="register-password" minlength="8" required />
          <button type="submit">Register</button>
        </form>
      </div>

      <div class="card">
        <h2>Login</h2>
        <form id="login-form">
          <label>Email</label>
          <input type="email" id="login-email" required />
          <label>Password</label>
          <input type="password" id="login-password" required />
          <button type="submit">Login</button>
        </form>
      </div>
    </section>

    <section class="dashboard hidden" id="dashboard">
      <div class="toolbar">
        <button id="logout-button">Logout</button>
        <span id="user-email"></span>
      </div>

      <div class="card">
        <h2>Create Task</h2>
        <form id="task-form">
          <label>Title</label>
          <input type="text" id="task-title" required />
          <label>Description</label>
          <textarea id="task-description"></textarea>
          <label>Priority</label>
          <select id="task-priority">
            <option value="medium">Medium</option>
            <option value="low">Low</option>
            <option value="high">High</option>
          </select>
          <label>Due date</label>
          <input type="datetime-local" id="task-due-date" />
          <button type="submit">Add Task</button>
        </form>
      </div>

      <div class="card filters">
        <h2>Filters</h2>
        <label>Priority</label>
        <select id="filter-priority">
          <option value="">All</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
        <label>Status</label>
        <select id="filter-status">
          <option value="">All</option>
          <option value="true">Completed</option>
          <option value="false">Open</option>
        </select>
        <label>Due Before</label>
        <input type="date" id="filter-before" />
        <label>Due After</label>
        <input type="date" id="filter-after" />
        <button id="filter-button">Apply</button>
      </div>

      <div class="tasks" id="tasks"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
